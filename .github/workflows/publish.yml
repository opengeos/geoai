name: Publish

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to publish (must already exist on GitHub)"
                required: true
                type: string

permissions:
    contents: write

jobs:
    publish:
        name: Publish plugin to plugins.qgis.org
        runs-on: ubuntu-latest
        env:
            TAG: ${{ github.event.release.tag_name || inputs.tag }}
            PLUGIN_DIR: qgis_plugin/geoai
            PLUGIN_NAME: geoai
            ZIP_PATH: dist/geoai.zip
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.13"

            - name: Read plugin version
              id: plugin_version
              run: |
                  plugin_version=$(grep '^version=' "$PLUGIN_DIR/metadata.txt" | cut -d'=' -f2 | tr -d '[:space:]')
                  if [ -z "$plugin_version" ]; then
                      echo "::error::Could not read plugin version from $PLUGIN_DIR/metadata.txt"
                      exit 1
                  fi
                  if ! echo "$plugin_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
                      echo "::error::Plugin version '$plugin_version' is not a valid version string"
                      exit 1
                  fi
                  echo "version=$plugin_version" >> "$GITHUB_OUTPUT"
                  echo "Release tag (package): $TAG"
                  echo "Plugin version (metadata.txt): $plugin_version"

            - name: Build plugin zip
              run: python "qgis_plugin/package_plugin.py" --source "$PLUGIN_DIR" --output "$ZIP_PATH"

            - name: Attach zip to GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "$TAG" "$ZIP_PATH" --clobber

            - name: Upload to plugins.qgis.org
              env:
                  QGIS_PLUGIN_REPO_USERNAME: ${{ secrets.QGIS_PLUGIN_REPO_USERNAME }}
                  QGIS_PLUGIN_REPO_PASSWORD: ${{ secrets.QGIS_PLUGIN_REPO_PASSWORD }}
              run: python scripts/upload_to_qgis_plugin_repo.py "$ZIP_PATH"
